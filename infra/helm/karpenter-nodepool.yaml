# Karpenter GPU capacity definition. A Pending pod that tolerates the GPU
# taint causes a g6e.xlarge to be provisioned (~1 min); an empty GPU node is
# consolidated away after 5 minutes. This replaces the static GPU node group,
# gpu-pause/resume scripting, and the stale-launch-template label bug (SE-6):
# labels/taints are stamped from this spec at provision time, every time.
# __NODE_ROLE__ and __CLUSTER__ are substituted by karpenter-install.sh.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu
spec:
  amiSelectorTerms:
    - alias: al2023@latest # resolves to the NVIDIA variant for GPU instance types
  role: __NODE_ROLE__
  subnetSelectorTerms:
    - tags: { karpenter.sh/discovery: __CLUSTER__ }
  securityGroupSelectorTerms:
    - tags: { karpenter.sh/discovery: __CLUSTER__ }
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 300Gi # model-weight cache (72B-class needs ~150GB + image)
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  tags:
    Project: kelsus-oss-ai-ref-arch
    ManagedBy: karpenter
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu
spec:
  template:
    metadata:
      labels:
        workload: inference
        nvidia.com/gpu.present: "true" # device-plugin affinity match
    spec:
      taints:
        - key: nvidia.com/gpu
          value: "true"
          effect: NoSchedule
      requirements:
        - { key: karpenter.sh/capacity-type, operator: In, values: [on-demand] }
        - { key: node.kubernetes.io/instance-type, operator: In, values: [g6e.xlarge] }
        - { key: kubernetes.io/arch, operator: In, values: [amd64] }
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu
      expireAfter: 720h
  # Hard capacity ceiling (~2x g6e.xlarge) — the structural version of the old
  # node group max_size. Cost cannot run away even if pods multiply.
  limits:
    cpu: "8"
    memory: 64Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
