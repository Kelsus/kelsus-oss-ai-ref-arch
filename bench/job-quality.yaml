# In-cluster quality-eval Job — survives laptop death, SSO expiry, and tunnels.
# initContainer pulls eval data + scorer code from S3 (pod identity, SA "bench");
# main container runs score.py against the in-cluster gateway/vLLM, prints the
# result between ===QUALITY===/===END=== markers, and uploads it to
# s3://<bucket>/results/quality/<ts>.json. Submitted by bench/run-quality-incluster.sh
# (which substitutes __BUCKET__ and the SKIP_/N env). Logs persist ~24h after finish.
apiVersion: batch/v1
kind: Job
metadata:
  name: bench-quality
  namespace: default
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      enableServiceLinks: false
      restartPolicy: Never
      serviceAccountName: bench
      # May run on the GPU node's spare CPU — the small CPU nodes are often
      # request-saturated (SE-5), and this Job is network/API-bound anyway.
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: fetch
          image: amazon/aws-cli:2.22.35
          command: ["sh", "-c"]
          args:
            - aws s3 sync s3://__BUCKET__/eval /work --only-show-errors && ls /work
          volumeMounts: [{ name: work, mountPath: /work }]
      containers:
        - name: score
          image: python:3.12-slim
          workingDir: /work
          command: ["sh", "-c"]
          args:
            - |
              set -o pipefail
              pip install --no-cache-dir -q requests psycopg2-binary boto3
              # The eval Job OWNS the GPU lifecycle: release vllm on ANY exit
              # (success, failure, or error). One mechanism, no watcher, no timer
              # race — the process that knows the eval is done frees the GPU.
              cat > /work/release.py <<'REL'
              import json, ssl, urllib.request
              sa = "/var/run/secrets/kubernetes.io/serviceaccount"
              tok = open(sa + "/token").read()
              ctx = ssl.create_default_context(cafile=sa + "/ca.crt")
              req = urllib.request.Request(
                  "https://kubernetes.default.svc/apis/apps/v1/namespaces/default/deployments/vllm/scale",
                  data=json.dumps({"spec": {"replicas": 0}}).encode(),
                  headers={"Authorization": "Bearer " + tok, "Content-Type": "application/merge-patch+json"},
                  method="PATCH")
              print("released GPU (vllm->0):", urllib.request.urlopen(req, context=ctx, timeout=30).status)
              REL
              trap 'python3 /work/release.py || true' EXIT
              # Wait for vLLM to come up IN-CLUSTER (up to ~3.5h). The laptop only
              # deploys + submits this Job; the long model download is waited out
              # here, so the run survives the laptop sleeping (SE-20). If vLLM never
              # serves, we exit non-zero and the trap releases the GPU.
              python3 - <<'WAIT'
              import time, urllib.request
              for _ in range(840):  # 840 * 15s = 3.5h
                  try:
                      if urllib.request.urlopen("http://vllm.default.svc:8000/health", timeout=5).status == 200:
                          print("vLLM ready — starting eval"); break
                  except Exception:
                      pass
                  time.sleep(15)
              else:
                  raise SystemExit("vLLM never became ready within 3.5h")
              WAIT
              python3 bench/quality/score.py > /work/out.txt 2>&1; RC=$?
              cat /work/out.txt
              python3 - "$RC" <<'PY'
              import boto3, datetime, re, sys
              rc = int(sys.argv[1])
              txt = open('/work/out.txt').read()
              ts = datetime.datetime.utcnow().strftime('%Y%m%dT%H%M%SZ')
              s3 = boto3.client('s3')
              # ALWAYS ship the full log first — it must survive pod TTL deletion
              s3.put_object(Bucket='__BUCKET__', Key=f'results/logs/{ts}.txt', Body=txt.encode())
              print(f'log -> s3://__BUCKET__/results/logs/{ts}.txt')
              m = re.search(r'===QUALITY===\s*(\{.*?\})\s*===END===', txt, re.S)
              if not m:
                  raise SystemExit('no QUALITY block found — see log above')
              prefix = '' if rc == 0 else 'INVALID-incomplete-'   # quarantine partial runs
              key = f'results/quality/{prefix}{ts}.json'
              s3.put_object(Bucket='__BUCKET__', Key=key, Body=m.group(1).encode())
              print(f'result -> s3://__BUCKET__/{key}')
              if rc != 0:
                  raise SystemExit(f'run INCOMPLETE (score.py rc={rc}) — quarantined')
              PY
          env:
            - { name: GATEWAY, value: "http://gateway.default.svc:8000" }
            - { name: JUDGE_URL, value: "http://vllm.default.svc:8000/v1" }
            - { name: WORKERS, value: "__WORKERS__" }
            - { name: EXTRACT_TIMEOUT, value: "__EXTRACT_TIMEOUT__" }
            - { name: RAG_TIMEOUT, value: "__RAG_TIMEOUT__" }
            - { name: "N", value: "__N__" }   # QUOTE the name: bare N is YAML-bool false (kubectl rejects)
            - { name: "QN", value: "__QN__" } # RAG questions (0=all)
            - { name: RAG_COLLECT, value: "__RAG_COLLECT__" }
            - { name: TIERS, value: "__TIERS__" }
            - { name: SKIP_COMMERCIAL, value: "__SKIP_COMMERCIAL__" }
            - { name: SKIP_EXTRACTION, value: "__SKIP_EXTRACTION__" }
            - { name: SKIP_RAG, value: "__SKIP_RAG__" }   # 1 = commercial/extraction-only re-score
          resources:
            requests: { cpu: "200m", memory: 768Mi } # bursts; API-bound (SE-5: request what you need)
            limits: { memory: 2Gi }
          volumeMounts: [{ name: work, mountPath: /work }]
      volumes:
        - name: work
          emptyDir: { sizeLimit: 2Gi }
